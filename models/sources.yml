version: 2

sources:
  - name: bronze
    database: comissao-prontuario
    schema: prontuarios_dados
    tables:
      - name: bronze_respostas_web
        description: "Dados brutos do sistema Web. Cada linha é uma submissão de auditoria com UUID e payload JSON completo."
        config:
          loaded_at_field: data_hora
          freshness:
            warn_after: {count: 20, period: day}
            error_after: {count: 35, period: day}
      - name: bronze_legado_respostas
        description: "Espelho da planilha Google Sheets do sistema antigo. Mais de 600 colunas horizontais representando todas as perguntas do formulário."
      - name: dim_perguntas
        description: "Dicionário oficial de perguntas. Mapeia o código interno (ex: Clinico_Id_NomeCompleto) para o label formatado exibido no Looker Studio."
      - name: configuracoes
        description: "Tabela de configuração com setores e especialidades disponíveis por empresa. Alimentada manualmente."